<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>JGM Site Safety Inspection Report</title>
<meta name="description" content="Daily site safety inspection reporting for JGM Team Leaders and HSE staff — checklist submissions, compliance tracking, and reporting dashboards.">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="icon" type="image/png" href="icon-192.png">
<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="JGM Safety">
<meta name="theme-color" content="#163878">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.5.0/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
:root{
  --navy:#752433;
  --navy-dark:#4a1420;
  --navy-tint:#f7e9eb;
  --maroon:#98283a;
  --maroon-light:#b3495a;
  --maroon-tint:#f7e9eb;
  --white:#ffffff;
  --grey-bg:#f2f3f5;
  --grey-border:#e0e2e7;
  --grey-mid:#9aa1ac;
  --text:#1a1f2b;
  --text-soft:#5b6270;
  --success:#1e8e5a;
  --success-tint:#e7f5ee;
  --danger:#c0392b;
  --danger-tint:#fbebe9;
  --warning:#b9720b;
  --warning-tint:#fbf1e0;
  --radius:14px;
  --shadow:0 2px 10px rgba(22,56,120,0.08);
  /* per-area accent colors */
  --area-adnoc:#2E86C1;
  --area-adnoc-tint:#eaf3fb;
  --area-enoc:#D32F2F;
  --area-enoc-tint:#fdecec;
  --area-emarat:#43A047;
  --area-emarat-tint:#eaf6ec;
  --area-civil:#B8860B;
  --area-civil-tint:#f9f1de;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  background:var(--grey-bg);
  color:var(--text);
  -webkit-tap-highlight-color:transparent;
}
#app{max-width:520px;margin:0 auto;min-height:100vh;background:var(--white);display:flex;flex-direction:column;position:relative;box-shadow:0 0 40px rgba(0,0,0,0.06);}
.topbar{
  background:linear-gradient(135deg,var(--navy) 0%, var(--navy-dark) 100%);
  color:var(--white);
  padding:14px 18px;
  display:flex;
  align-items:center;
  gap:12px;
  position:sticky;top:0;z-index:20;
}
.topbar img{height:34px;width:auto;display:block;border-radius:6px;background:#fff;padding:3px;}
.topbar .title{font-size:15px;font-weight:700;line-height:1.25;}
.topbar .sub{font-size:11px;opacity:0.85;font-weight:500;}
.topbar .spacer{flex:1;}
.topbar button.icon-btn{
  background:rgba(255,255,255,0.14);border:none;color:#fff;border-radius:10px;
  padding:8px 12px;font-size:13px;font-weight:600;cursor:pointer;
}
.hamburger-btn{
  background:rgba(255,255,255,0.16);border:none;border-radius:10px;
  width:38px;height:38px;display:flex;align-items:center;justify-content:center;
  cursor:pointer;flex-shrink:0;
}
.hamburger-btn svg{width:18px;height:18px;}
.topbar img.logo-sm{height:30px;width:auto;border-radius:6px;background:#fff;padding:2px;flex-shrink:0;}

/* Drawer */
.drawer-overlay{position:fixed;inset:0;background:rgba(15,20,30,0.5);z-index:200;display:flex;}
.drawer-panel{background:#fff;width:82%;max-width:340px;height:100%;display:flex;flex-direction:column;box-shadow:4px 0 24px rgba(0,0,0,0.15);animation:slideIn .18s ease;}
@keyframes slideIn{from{transform:translateX(-14px);opacity:0.6;}to{transform:translateX(0);opacity:1;}}
.drawer-header{display:flex;align-items:center;justify-content:space-between;padding:16px 18px;border-bottom:1px solid var(--grey-border);}
.drawer-header img{height:34px;}
.drawer-close-btn{background:var(--grey-bg);border:none;border-radius:10px;width:34px;height:34px;font-size:16px;cursor:pointer;color:var(--text-soft);}
.drawer-menu{padding:14px 10px;flex:1;}
.drawer-item{display:flex;align-items:center;gap:14px;padding:14px 12px;border-radius:12px;cursor:pointer;font-weight:700;font-size:15px;color:var(--text);margin-bottom:4px;}
.drawer-item:active{background:var(--navy-tint);}
.drawer-item.active-item{background:var(--navy-tint);color:var(--navy);}
.drawer-item .di-icon{width:22px;height:22px;flex-shrink:0;color:var(--navy);}
.drawer-item .di-chev{margin-left:auto;color:var(--grey-mid);}
.drawer-item.locked .di-icon{color:var(--maroon);}
.drawer-footer{padding:16px;text-align:center;font-size:11.5px;color:var(--grey-mid);border-top:1px solid var(--grey-border);}

/* Gradient home stat card */
.home-hero{
  background:linear-gradient(115deg, var(--maroon) 0%, var(--navy) 100%);
  border-radius:18px;padding:20px;color:#fff;margin-bottom:16px;
}
.home-hero .hero-date{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:600;opacity:0.92;margin-bottom:16px;}
.home-hero .hero-date svg{width:16px;height:16px;}
.hero-stats{display:flex;align-items:center;}
.hero-stats .hstat{flex:1;}
.hero-stats .hstat .hnum{font-size:28px;font-weight:900;line-height:1;}
.hero-stats .hstat .hlbl{font-size:10.5px;font-weight:700;letter-spacing:0.4px;opacity:0.85;text-transform:uppercase;margin-bottom:4px;}
.hero-divider{width:1px;height:36px;background:rgba(255,255,255,0.35);margin:0 18px;}

.start-inspection-btn{
  display:flex;align-items:center;gap:12px;width:100%;background:#fff;
  border:2px solid var(--maroon);border-radius:16px;padding:16px 18px;cursor:pointer;
  font-size:15.5px;font-weight:800;color:var(--maroon);margin-bottom:20px;box-shadow:var(--shadow);
}
.start-inspection-btn .si-icon{width:20px;height:20px;}
.start-inspection-btn .si-chev{margin-left:auto;}

.section-label{font-size:11.5px;font-weight:800;color:var(--text-soft);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:10px;}
.area-tile-v2{
  display:flex;align-items:center;gap:10px;padding:18px 14px;border-radius:14px;
  border:1.75px solid var(--grey-border);background:#fff;cursor:pointer;font-weight:800;font-size:14.5px;
}
.area-tile-v2 svg{width:20px;height:20px;flex-shrink:0;}
.area-tile-v2.adnoc{border-color:var(--area-adnoc);color:var(--area-adnoc);}
.area-tile-v2.enoc{border-color:var(--area-enoc);color:var(--area-enoc);}
.area-tile-v2.emarat{border-color:var(--area-emarat);color:var(--area-emarat);}
.area-tile-v2.civil{border-color:var(--area-civil);color:var(--area-civil);}
.area-tile-v2:active{opacity:0.75;}
.tile-badge{position:absolute;top:-8px;right:-8px;font-size:10px;font-weight:800;padding:3px 7px;border-radius:20px;box-shadow:0 1px 4px rgba(0,0,0,0.2);}
.tile-badge.submitted{background:var(--success);color:#fff;}
.tile-badge.draft{background:var(--warning);color:#fff;}

.brand-footer-card{background:#fff;border:1px solid var(--grey-border);border-radius:16px;padding:24px 18px;text-align:center;margin-top:18px;box-shadow:var(--shadow);}
.brand-footer-card img{height:40px;margin-bottom:12px;}
.brand-footer-card .bf-title{font-weight:700;font-size:13.5px;color:var(--text);}
.brand-footer-card .bf-ref{font-size:11.5px;color:var(--text-soft);margin-top:3px;}

.chart-card{background:#fff;border:1px solid var(--grey-border);border-radius:var(--radius);padding:16px;margin-bottom:16px;box-shadow:var(--shadow);}
.chart-card h3{margin:0 0 12px;font-size:14px;color:var(--navy);}
.chart-wrap{position:relative;height:220px;}
.chart-wrap.small{height:180px;}
.content{flex:1;padding:18px;padding-bottom:36px;}
.center-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:70vh;text-align:center;padding:24px;}
.cover-bg{
  min-height:100vh;
  background-color:var(--grey-bg);
  background-image:
    radial-gradient(circle at 1px 1px, rgba(22,56,120,0.12) 1.4px, transparent 0);
  background-size: 24px 24px;
  position:relative;
}
.cover-bg::before{
  content:"";position:absolute;top:0;left:0;right:0;height:130px;
  background:linear-gradient(160deg, var(--maroon) 0%, var(--navy) 100%);
  clip-path:polygon(0 0,100% 0,100% 45%,0 100%);
  opacity:0.95;z-index:0;
}
.cover-content{position:relative;z-index:1;padding-top:6px;}
.cover-content .logo-badge{display:inline-block;background:#fff;border-radius:16px;padding:14px 20px;box-shadow:0 8px 28px rgba(22,56,120,0.25);}
.cover-content .logo-badge .logo-big{margin-bottom:0;display:block;}
.logo-big{width:120px;height:auto;margin-bottom:18px;}
h1.brand-title{font-size:22px;color:var(--navy);margin:0 0 4px;font-weight:800;letter-spacing:-0.2px;}
p.brand-sub{color:var(--text-soft);font-size:14px;margin:0 0 30px;}
.role-stack{width:100%;display:flex;flex-direction:column;gap:14px;}
.big-btn{
  display:flex;align-items:center;gap:14px;width:100%;
  padding:20px;border-radius:var(--radius);border:none;cursor:pointer;
  font-size:16px;font-weight:700;text-align:left;box-shadow:var(--shadow);
  transition:transform .12s ease;
}
.big-btn:active{transform:scale(0.98);}
.big-btn.navy{background:var(--navy);color:#fff;}
.big-btn.maroon{background:var(--maroon);color:#fff;}
.big-btn .emoji{font-size:26px;}
.big-btn small{display:block;font-weight:500;font-size:12.5px;opacity:0.85;margin-top:2px;}

.card{background:#fff;border:1px solid var(--grey-border);border-radius:var(--radius);padding:16px;margin-bottom:14px;box-shadow:var(--shadow);}
.card h3{margin:0 0 10px;font-size:15px;color:var(--navy);}

.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:8px;
  padding:14px 18px;border-radius:12px;border:none;cursor:pointer;
  font-size:15px;font-weight:700;width:100%;transition:transform .1s ease, opacity .15s ease;
}
.btn:active{transform:scale(0.98);}
.btn.primary{background:var(--navy);color:#fff;}
.btn.maroon{background:var(--maroon);color:#fff;}
.btn.success{background:var(--success);color:#fff;}
.btn.outline{background:#fff;color:var(--navy);border:2px solid var(--navy);}
.btn.outline.maroon-o{color:var(--maroon);border-color:var(--maroon);}
.btn.ghost{background:transparent;color:var(--text-soft);font-weight:600;}
.btn.danger{background:var(--danger);color:#fff;}
.btn.small{padding:9px 12px;font-size:13px;width:auto;border-radius:9px;}
.btn:disabled{opacity:0.45;cursor:not-allowed;}
.btn-row{display:flex;gap:10px;}
.btn-row .btn{flex:1;}

label.field-label{display:block;font-size:12.5px;font-weight:700;color:var(--text-soft);margin:14px 0 6px;text-transform:uppercase;letter-spacing:0.3px;}
label.field-label:first-child{margin-top:0;}
input[type=text], input[type=tel], input[type=date], select, textarea{
  width:100%;padding:14px;border-radius:11px;border:1.5px solid var(--grey-border);
  font-size:15.5px;background:#fbfbfc;color:var(--text);font-family:inherit;
}
input:focus, select:focus, textarea:focus{outline:2px solid var(--navy);border-color:var(--navy);background:#fff;}
select{appearance:none;-webkit-appearance:none;background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='14' height='9'><path d='M1 1l6 6 6-6' stroke='%23163878' stroke-width='2' fill='none' fill-rule='evenodd'/></svg>");background-repeat:no-repeat;background-position:right 16px center;padding-right:38px;}
textarea{min-height:70px;resize:vertical;}

.area-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.area-tile{
  padding:26px 10px;border-radius:var(--radius);border:2px solid var(--grey-border);background:#fff;
  font-weight:800;font-size:16px;color:var(--navy);cursor:pointer;text-align:center;
}
.area-tile.selected{border-color:var(--navy);background:var(--navy-tint);}

.checklist-item{border:1.5px solid var(--grey-border);border-radius:12px;padding:12px 14px;margin-bottom:10px;background:#fbfbfc;}
.checklist-item .qnum{font-size:11px;color:var(--maroon);font-weight:800;letter-spacing:0.4px;}
.checklist-item .qtext{font-size:14.5px;font-weight:600;margin:3px 0 10px;color:var(--text);}
.answer-pills{display:flex;gap:8px;}
.pill-btn{flex:1;padding:11px 4px;border-radius:9px;border:1.5px solid var(--grey-border);background:#fff;font-weight:700;font-size:13.5px;cursor:pointer;color:var(--text-soft);}
.pill-btn.yes.active{background:var(--success);border-color:var(--success);color:#fff;}
.pill-btn.no.active{background:var(--danger);border-color:var(--danger);color:#fff;}
.pill-btn.na.active{background:var(--grey-mid);border-color:var(--grey-mid);color:#fff;}

.progress-wrap{background:var(--grey-border);border-radius:20px;height:8px;margin-bottom:16px;overflow:hidden;}
.progress-bar{height:100%;background:var(--navy);border-radius:20px;transition:width .2s ease;}

.status-chip{display:inline-block;padding:4px 10px;border-radius:20px;font-size:11.5px;font-weight:800;letter-spacing:0.2px;}
.status-chip.submitted{background:var(--success-tint);color:var(--success);}
.status-chip.draft{background:var(--warning-tint);color:var(--warning);}
.status-chip.missing{background:var(--danger-tint);color:var(--danger);}

.compliance-badge{font-size:34px;font-weight:900;color:var(--navy);}
.compliance-ring{width:110px;height:110px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 14px;border:8px solid var(--grey-border);}

table{width:100%;border-collapse:collapse;font-size:13px;}
th{text-align:left;background:var(--navy-tint);color:var(--navy);padding:9px 8px;font-size:11px;text-transform:uppercase;letter-spacing:0.3px;position:sticky;top:0;}
td{padding:9px 8px;border-bottom:1px solid var(--grey-border);vertical-align:middle;}
.table-wrap{overflow-x:auto;border:1px solid var(--grey-border);border-radius:12px;margin-bottom:14px;}

.tab-row{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;margin-bottom:16px;}
.tab-btn{flex-shrink:0;padding:9px 14px;border-radius:20px;border:1.5px solid var(--grey-border);background:#fff;font-weight:700;font-size:12.5px;cursor:pointer;color:var(--text-soft);}
.tab-btn.active{background:var(--maroon);border-color:var(--maroon);color:#fff;}

.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:18px;}
.stat-card{background:#fff;border:1px solid var(--grey-border);border-radius:var(--radius);padding:16px;box-shadow:var(--shadow);}
.stat-card .num{font-size:26px;font-weight:900;color:var(--navy);}
.stat-card .lbl{font-size:11.5px;color:var(--text-soft);font-weight:700;text-transform:uppercase;margin-top:2px;}
.stat-card.maroon .num{color:var(--maroon);}

.rank-row{display:flex;align-items:center;gap:12px;padding:12px;border:1px solid var(--grey-border);border-radius:12px;margin-bottom:8px;background:#fff;}
.rank-medal{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:13px;color:#fff;flex-shrink:0;}
.rank-1{background:#c9962c;}
.rank-2{background:#9aa1ac;}
.rank-3{background:#a3672f;}
.rank-other{background:var(--navy);}
.rank-worst-1{background:var(--danger);}
.rank-worst-2{background:#d97757;}
.rank-worst-3{background:#e0a25e;}
.stat-card.sort-active{outline:2.5px solid var(--navy);outline-offset:-2px;}
.stat-card.maroon.sort-active{outline-color:var(--danger);}
.rank-info{flex:1;min-width:0;}
.rank-info .name{font-weight:700;font-size:14px;}
.rank-info .meta{font-size:11.5px;color:var(--text-soft);}
.rank-score{font-weight:900;font-size:16px;color:var(--navy);}

.banner{padding:12px 14px;border-radius:12px;font-size:13.5px;font-weight:600;margin-bottom:16px;display:flex;align-items:center;gap:10px;}
.banner.warn{background:var(--warning-tint);color:var(--warning);}
.banner.info{background:var(--navy-tint);color:var(--navy);}
.banner.ok{background:var(--success-tint);color:var(--success);}

.empty-state{text-align:center;padding:40px 20px;color:var(--text-soft);}
.empty-state .big-icon{font-size:38px;margin-bottom:10px;}

.back-link{background:none;border:none;color:var(--white);font-size:20px;cursor:pointer;padding:4px;}
.modal-overlay{position:fixed;inset:0;background:rgba(15,20,30,0.55);display:flex;align-items:flex-end;justify-content:center;z-index:100;}
.modal-sheet{background:#fff;width:100%;max-width:520px;border-radius:20px 20px 0 0;padding:22px;max-height:85vh;overflow-y:auto;}
.modal-sheet h3{margin-top:0;color:var(--navy);}
.tl-pick{display:flex;justify-content:space-between;align-items:center;padding:14px;border:1.5px solid var(--grey-border);border-radius:12px;margin-bottom:10px;cursor:pointer;}
.tl-pick:active{background:var(--navy-tint);}
.tl-pick .n{font-weight:700;font-size:14.5px;}
.tl-pick .m{font-size:12px;color:var(--text-soft);}
.footer-note{text-align:center;font-size:11px;color:var(--grey-mid);margin-top:20px;padding-bottom:6px;}
.search-box{position:relative;margin-bottom:14px;}
.icon-input{padding-left:38px;}
.search-box::before{content:"🔍";position:absolute;left:13px;top:13px;font-size:14px;opacity:0.5;}
.chip-filter{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px;}
.action-icon-btn{background:var(--grey-bg);border:none;border-radius:8px;padding:6px 9px;cursor:pointer;font-size:13px;margin-right:4px;}
.divider{height:1px;background:var(--grey-border);margin:18px 0;}
::-webkit-scrollbar{height:4px;width:4px;}
</style>
</head>
<body>
<div id="app"></div>
<a href="/" style="position:fixed;bottom:14px;left:14px;z-index:9999;background:#163878;color:#fff;font-family:-apple-system,sans-serif;font-size:12.5px;font-weight:600;padding:9px 14px;border-radius:999px;text-decoration:none;box-shadow:0 2px 10px rgba(0,0,0,.18);">← Portal</a>

/* ===================== STORAGE HELPERS (backed by shared Supabase kv_store table) =====================
   NAMESPACED: this app (JGM) prefixes every key with "jgm:" so its data can
   share the same kv_store table as the Joseph Group and JA Installation apps
   without ever colliding with their keys. */
const APP_NS = "jgm:";
let lastStorError = null;
async function storGet(key){
  if(!dbReady){ lastStorError = "Database not configured (credentials.txt placeholders were never filled in during build)."; return null; }
  try{
    const {data, error} = await sb.from("kv_store").select("value").eq("key", APP_NS+key).maybeSingle();
    if(error) throw error;
    return data ? data.value : null;
  }catch(e){ lastStorError = e.message || String(e); console.error("storGet failed", key, e); return null; }
}
async function storSet(key, val){
  if(!dbReady){ lastStorError = "Database not configured (credentials.txt placeholders were never filled in during build)."; return false; }
  try{
    const {error} = await sb.from("kv_store").upsert({key: APP_NS+key, value: val, updated_at: new Date().toISOString()});
    if(error) throw error;
    return true;
  }catch(e){ lastStorError = e.message || String(e); console.error("storSet failed", key, e); return false; }
}
async function storDelete(key){
  if(!dbReady) return false;
  try{
    const {error} = await sb.from("kv_store").delete().eq("key", APP_NS+key);
    if(error) throw error;
    return true;
  }catch(e){ console.error("storDelete failed", key, e); return false; }
}
async function storList(prefix){
  if(!dbReady) return [];
  try{
    const {data, error} = await sb.from("kv_store").select("key").like("key", APP_NS+prefix + "%");
    if(error) throw error;
    return data ? data.map(r=>r.key.slice(APP_NS.length)) : [];
  }catch(e){ console.error("storList failed", prefix, e); return []; }
}
function sanitizeMobile(m){ return (m||"").replace(/[^0-9+]/g,""); }
function tlKey(mobile){ return "tl:" + sanitizeMobile(mobile); }
function rptKey(date, mobile, area){ return "rpt:" + date + ":" + sanitizeMobile(mobile) + ":" + area; }
function parseRptKey(key){
  const parts = key.split(":");
  return {date: parts[1], mobile: parts[2], area: parts.slice(3).join(":")};
}

function fmtDate(str){

}

/* ===================== PHOTO HELPERS (compressed base64, stored inline in the report row) ===================== */
const MAX_PHOTOS = 3;
function readFileAsDataURL(file){
  return new Promise((resolve, reject)=>{
    const r = new FileReader();
    r.onload = ()=>resolve(r.result);
    r.onerror = ()=>reject(r.error);
    r.readAsDataURL(file);
  });
}
function compressImage(dataUrl, maxDim, quality){
  return new Promise((resolve, reject)=>{
    const img = new Image();
    img.onload = ()=>{
      let {width, height} = img;
      if(width > height && width > maxDim){ height = Math.round(height * (maxDim/width)); width = maxDim; }
      else if(height >= width && height > maxDim){ width = Math.round(width * (maxDim/height)); height = maxDim; }
      const canvas = document.createElement("canvas");
      canvas.width = width; canvas.height = height;
      const ctx = canvas.getContext("2d");
      ctx.drawImage(img, 0, 0, width, height);
      resolve(canvas.toDataURL("image/jpeg", quality));
    };
    img.onerror = ()=>reject(new Error("Could not read image"));
    img.src = dataUrl;
  });
}
async function handlePhotoFiles(fileList){
  if(!fileList || !fileList.length) return;
  const room = MAX_PHOTOS - state.photos.length;
  if(room <= 0){ alert(`You can attach a maximum of ${MAX_PHOTOS} photos.`); return; }
  const files = Array.from(fileList).slice(0, room);
  state.photoBusy = true; render();
  try{
    for(const file of files){
      if(!file.type.startsWith("image/")) continue;
      const raw = await readFileAsDataURL(file);
      const compressed = await compressImage(raw, 1280, 0.65);
      state.photos.push(compressed);
    }
  }catch(e){ console.error("photo compress failed", e); alert("Couldn't process one of the photos. Please try again."); }
  state.photoBusy = false;
  render();
  await saveDraft();
}
async function removePhoto(idx){
  state.photos.splice(idx, 1);
  render();
  await saveDraft();
}

function calcCompliance(answers){
  const vals = Object.values(answers).filter(v=>v);
  const yes = vals.filter(v=>v==="Yes").length;
  const no = vals.filter(v=>v==="No").length;
  const total = yes+no;
  if(total===0) return null;
  return Math.round((yes/total)*100);
}
function isComplete(answers){
  return CHECKLIST.every(item => answers[item.id]);

/* ===================== RENDER ROOT ===================== */
function render(){
  const app = document.getElementById("app");
  app.innerHTML = screenTemplate();
  bindScreenEvents();
}

function screenTemplate(){
  switch(state.screen){
    case "loading": return tplLoading();
    case "role": return tplRole();
    case "tl_identify": return wrapTL(tplTLIdentify(), "Site Team Leader", true);
    case "tl_register": return wrapTL(tplTLRegister(), "New Registration", true);
    case "tl_home": return wrapTL(tplTLHome(), state.currentTL ? state.currentTL.name : "Home", false);
    case "tl_area": return wrapTL(tplTLArea(), "Select Area", true);
    case "tl_form": return wrapTL(tplTLForm(), state.selectedArea + " Inspection", true);
    case "tl_review": return wrapTL(tplTLReview(), "Review & Submit", true);
    case "tl_success": return wrapTL(tplTLSuccess(), "Submitted", false);
    case "tl_reports": return wrapTL(tplTLReports(), "My Reports", true);
    case "hse_pin": return tplHSEPin();
    case "hse_dash": return tplHSEDash();
    default: return tplLoading();
  }
}

function wrapTL(inner, title, showBack){
  const stepScreens = ["tl_area","tl_form","tl_review"];
  const isStep = stepScreens.includes(state.screen);
  const preLogin = !state.currentTL;
  const leftBtn = preLogin
    ? `<button class="icon-btn" data-act="back">${ICON.back}</button>`
    : `<button class="hamburger-btn" data-act="open-drawer">${SVG.hamburger}</button>`;
  let rightActions = `<button class="icon-btn" data-act="refresh" title="Refresh">${SVG.refresh}</button>`;
  if(isStep){
    rightActions += `<button class="icon-btn" data-act="save-exit">Save &amp; Exit</button>`;
  } else if(state.screen==="tl_reports"){
    rightActions += `<button class="icon-btn" data-act="back">${ICON.back}</button>`;
  } else if(!preLogin){
    rightActions += `<button class="icon-btn" data-act="switch-profile" title="Back to Login">${SVG.exit}</button>`;
  }
  return `
  <div class="topbar">
    ${leftBtn}
    <img src="${LOGO_SRC}" class="logo-sm" alt="JGM"/>
    <div>
      <div class="title">${title}</div>
      <div class="sub">JGM Safety Inspection</div>
    </div>
    <div class="spacer"></div>
    ${rightActions}
  </div>
  <div class="content">${inner}</div>
  ${(!preLogin && state.drawerOpen) ? drawerTemplate() : ""}
  `;
}

function drawerTemplate(){
  const items = [
    {key:"home", icon:SVG.home, label:"Home", act:"drawer-home"},

function tplTLHome(){
  return `<div id="tlHomeWrap"><div class="center-screen" style="min-height:30vh;"><p class="brand-sub">Loading today's status…</p></div></div>`;
}
const AREA_META = {
  ADNOC:{cls:"adnoc", icon:SVG.building},
  ENOC:{cls:"enoc", icon:SVG.building},
  EMARAT:{cls:"emarat", icon:SVG.building},
  CIVIL:{cls:"civil", icon:SVG.building}
};
function areaTileCls(a){ return AREA_META[a] ? AREA_META[a].cls : ""; }
function areaTileIcon(a){ return AREA_META[a] ? AREA_META[a].icon : SVG.building; }
function areaTileStyle(a){
  if(AREA_META[a]) return "";
  const c = AREA_COLORS[a] || "#8E44AD";
  return `border-color:${c};color:${c};`;
}
function areaBadge(rep){
  if(!rep) return "";
  if(rep.status==="submitted") return `<span class="tile-badge submitted">${ICON.check}</span>`;
  return `<span class="tile-badge draft">Draft</span>`;
}
async function renderTLHomeAsync(){
  if(state.screen !== "tl_home") return;
  const mobile = sanitizeMobile(state.currentTL.mobile);
  const today = todayStr();
  const yest = yesterdayStr();
  const todayKeys = await storList("rpt:" + today + ":" + mobile + ":");
  const yestKeys = await storList("rpt:" + yest + ":" + mobile + ":");
  const relevantReports = (await Promise.all([...todayKeys, ...yestKeys].map(k=>storGet(k)))).filter(Boolean);
  const todayByArea = {};
  AREAS.forEach(a=>{
    const candidates = relevantReports.filter(r=>r.area===a);
    const active = candidates.find(r=>!isExpired(r)) || null;
    todayByArea[a] = active;
  });
  const submittedCount = AREAS.filter(a=>todayByArea[a] && todayByArea[a].status==="submitted").length;
  const wrap = document.getElementById("tlHomeWrap");
  if(!wrap) return;

  // rolling personal average compliance (last 7 submitted reports, any area, any date)
  const allKeys = await storList("rpt:");
  const mine = allKeys.filter(k=>parseRptKey(k).mobile === mobile);
  const myReports = (await Promise.all(mine.map(k=>storGet(k)))).filter(r=>r && r.status==="submitted" && r.compliance!==null).sort((a,b)=>b.date.localeCompare(a.date));
  const recent = myReports.slice(0,7);
  const avgCompliance = recent.length ? Math.round(recent.reduce((a,r)=>a+r.compliance,0)/recent.length) : null;

  // any open (unsubmitted) drafts expiring within 2 hours?
  const soonMs = 2*60*60*1000;
  const expiringSoon = AREAS.filter(a=>{
    const r = todayByArea[a];
    return r && r.status==="draft" && r.expiresAt && (Date.parse(r.expiresAt) - Date.now()) < soonMs;
  });

  let banner = "";
  if(expiringSoon.length > 0){
    banner = `<div class="banner warn">${ICON.bell} ${expiringSoon.join(", ")} draft${expiringSoon.length>1?'s':''} will lock soon — you have 24 hours from when you started each one to submit it.</div>`;
  } else if(submittedCount===0){
    banner = `<div class="banner info">${ICON.bell} Reminder: you have 24 hours from when you start an inspection to submit it, after which it locks automatically.</div>`;
  } else if(submittedCount < AREAS.length){
    banner = `<div class="banner ok">${ICON.check} ${submittedCount} of ${AREAS.length} areas submitted. Tap another area below if you inspected more than one location.</div>`;
  } else {
    banner = `<div class="banner ok">${ICON.check} All areas submitted. Each report stays editable for 24 hours from when you started it.</div>`;
  }

  const dateLabel = new Date().toLocaleDateString("en-GB",{weekday:"long", day:"numeric", month:"long", year:"numeric"});

  wrap.innerHTML = `
    ${banner}
    <div class="home-hero">
      <div class="hero-date">${SVG.calendar} ${dateLabel}</div>
      <div class="hero-stats">
        <div class="hstat">
          <div class="hlbl">Submitted Today</div>
          <div class="hnum">${submittedCount}/${AREAS.length}</div>
        </div>
        <div class="hero-divider"></div>
        <div class="hstat">
          <div class="hlbl">Avg Compliance</div>
          <div class="hnum">${avgCompliance===null ? '—' : avgCompliance+'%'}</div>
        </div>
      </div>
    </div>

    <button class="start-inspection-btn" data-act="start-inspection">
      ${SVG.clipIcon.replace('class="di-icon"','class="si-icon"')}
      <span>${submittedCount>0 ? "Add / Edit an Inspection" : "Start Today's Inspection"}</span>
      <span class="si-chev">${SVG.chevR}</span>
    </button>

    <div class="section-label">Work Areas — tap to start or edit that area's report</div>
    <div class="area-grid" style="margin-bottom:18px;">
      ${AREAS.map(a=>`
        <button class="area-tile-v2 ${areaTileCls(a)}" data-act="pick-area" data-area="${a}" style="position:relative;${areaTileStyle(a)}">
          ${areaBadge(todayByArea[a])}
          ${areaTileIcon(a)} <span>${a}</span>
        </button>`).join("")}
      <button class="area-tile-v2" data-act="open-add-area-modal" style="border-style:dashed;color:var(--text-soft);">
        ${SVG.plus || "+"} <span>Add Area</span>
      </button>
    </div>

    <div class="brand-footer-card">
      <img src="${LOGO_SRC}" alt="JGM"/>
      <div class="bf-title">Daily Site Safety Inspection Report</div>
      <div class="bf-ref">Ref: IMS/JG/HSE/FRM_036/R00</div>
    </div>
  `;
  bindDynamicEvents();
}

/* ===================== TEAM LEADER: FORM ===================== */
function formatRemaining(ms){
  if(ms<=0) return "expired";
  const totalMin = Math.floor(ms/60000);
  const h = Math.floor(totalMin/60);
  const m = totalMin%60;
  return `${h}h ${m}m`;
}
function tplTLForm(){
  if(state.reportLocked){
    const p = state.lockedPreview;
    return `
    <div class="banner warn">${ICON.warn} This ${state.selectedArea} report started on ${p ? fmtDate(p.date) : ''} and its 24-hour edit window has expired. It is now locked and can no longer be edited by you — contact HSE if changes are needed.</div>
    <div class="card">
      <h3>${state.selectedArea} — Locked Report (started ${p?fmtDate(p.date):''})</h3>
      ${p ? `
        <div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--grey-border);font-size:13.5px;"><span>Man Power</span><b>${p.manpower===null||p.manpower===undefined?'—':p.manpower}</b></div>
        ${CHECKLIST.map(item=>`
        <div style="display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--grey-border);font-size:13px;">
          <span>${item.label}</span><b>${(p.answers && p.answers[item.id]) || '—'}</b>
        </div>`).join("")}
        ${p.photos && p.photos.length ? `<div style="margin-top:10px;"><b style="font-size:13px;">Site Photos:</b><div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:8px;">${p.photos.map(src=>`<img src="${src}" style="width:72px;height:72px;object-fit:cover;border-radius:10px;border:1px solid var(--grey-border);"/>`).join("")}</div></div>` : ""}
        <div style="margin-top:10px;"><span class="status-chip ${p.status==='submitted'?'submitted':'missing'}">${p.status==='submitted'?'WAS SUBMITTED':'NEVER SUBMITTED'}</span></div>
      ` : ""}
    </div>
    <button class="btn primary" data-act="pick-area" data-area="${state.selectedArea}">Start a New ${state.selectedArea} Report</button>
    `;
  }
  const answered = CHECKLIST.filter(i=>state.answers[i.id]).length + (state.manpower!=="" && state.manpower!==null ? 1 : 0) + (state.photos.length>0 ? 1 : 0);
  const totalFields = CHECKLIST.length + 2;
  const pct = Math.round((answered/totalFields)*100);
  return `
  <div class="progress-wrap"><div class="progress-bar" style="width:${pct}%;"></div></div>
  <div style="font-size:12px;color:var(--text-soft);margin-bottom:14px;">${answered} of ${totalFields} items answered · Area: <b>${state.selectedArea}</b> · Auto-saving draft</div>
  ${state.reportExpiresAt ? `<div class="banner info" style="margin-bottom:14px;">${ICON.bell} Time remaining to submit: <b>${formatRemaining(Date.parse(state.reportExpiresAt) - Date.now())}</b> (24h window from when you started this report)</div>` : ""}
  <div class="checklist-item">
    <div class="qnum">MAN POWER</div>
    <div class="qtext">Number of workers on site</div>
    <input type="number" min="0" step="1" id="manpowerInput" placeholder="e.g. 8" value="${escapeHtml(state.manpower)}" inputmode="numeric"/>
  </div>
  ${CHECKLIST.map((item,idx)=>`
    <div class="checklist-item">
      <div class="qnum">ITEM ${idx+1}</div>
      <div class="qtext">${item.label}</div>
      <div class="answer-pills">
        <button class="pill-btn yes ${state.answers[item.id]==='Yes'?'active':''}" data-act="answer" data-id="${item.id}" data-val="Yes">Yes</button>
        <button class="pill-btn no ${state.answers[item.id]==='No'?'active':''}" data-act="answer" data-id="${item.id}" data-val="No">No</button>
        <button class="pill-btn na ${state.answers[item.id]==='N/A'?'active':''}" data-act="answer" data-id="${item.id}" data-val="N/A">N/A</button>
      </div>
    </div>`).join("")}
  ${tplPhotoSection(true)}
  <label class="field-label">Comments (optional)</label>
  <textarea id="tlComments" placeholder="Any observations or notes...">${escapeHtml(state.comments)}</textarea>
  <button class="btn primary" style="margin-top:18px;" data-act="go-review" ${answered<totalFields?"disabled":""}>
    Review Inspection
  </button>
  ${answered<totalFields ? `<div style="text-align:center;font-size:12px;color:var(--text-soft);margin-top:8px;">Fill in Man Power, answer all ${CHECKLIST.length} items, and attach at least 1 site photo to continue</div>` : ""}
  `;

  </div>`;
}

        ctx.fillStyle = "#5b6270";

};

function dateRangeForPreset(preset, from, to){
  const end = new Date(); end.setHours(23,59,59,999);
  let start;
  if(preset==="today"){ start = new Date(); start.setHours(0,0,0,0); }
  else if(preset==="yesterday"){ start = new Date(); start.setDate(start.getDate()-1); start.setHours(0,0,0,0); end.setDate(end.getDate()-1); end.setHours(23,59,59,999); }
  else if(preset==="15"){ start = new Date(); start.setDate(start.getDate()-15); }
  else if(preset==="30"){ start = new Date(); start.setDate(start.getDate()-30); }
  else if(preset==="90"){ start = new Date(); start.setDate(start.getDate()-90); }
  else if(preset==="custom"){ start = from ? new Date(from+"T00:00:00") : new Date(0); return {start, end: to ? new Date(to+"T23:59:59") : end}; }
  else { start = new Date(0); }
  return {start, end};
}
async function getReportsInRange(preset, area, from, to){
  const {start, end} = dateRangeForPreset(preset, from, to);
  const keys = await storList("rpt:");
  const all = (await Promise.all(keys.map(k=>storGet(k)))).filter(Boolean);
  return all.filter(r=>{
    const d = new Date(r.date+"T12:00:00");
    const inRange = d >= start && d <= end;
    const areaMatch = area==="all" || r.area===area;
    return inRange && areaMatch;
  });
}

/* ---- Performance ---- */
function computeAreaBreakdown(reportsForLeader){
  const agg = {};
  reportsForLeader.forEach(r=>{
    if(r.compliance===null) return;
    if(!agg[r.area]) agg[r.area] = {total:0, count:0};
    agg[r.area].total += r.compliance;
    agg[r.area].count += 1;
  });
  return Object.keys(agg).map(a=>({area:a, avg:Math.round(agg[a].total/agg[a].count), count:agg[a].count})).sort((a,b)=>a.avg-b.avg);
}

function computeItemFailures(reportsForLeader){
  const tally = {};
  CHECKLIST.forEach(item=>{ tally[item.id] = {no:0, total:0}; });
  reportsForLeader.forEach(r=>{
    CHECKLIST.forEach(item=>{
      const ans = r.answers ? r.answers[item.id] : null;
      if(ans === "Yes" || ans === "No"){
        tally[item.id].total += 1;
        if(ans === "No") tally[item.id].no += 1;
      }
    });
  });
  return CHECKLIST.map(item=>({
    id:item.id, label:item.label,
    no: tally[item.id].no, total: tally[item.id].total,
    failRate: tally[item.id].total ? Math.round((tally[item.id].no/tally[item.id].total)*100) : 0
  })).filter(x=>x.no>0).sort((a,b)=> b.no-a.no || b.failRate-a.failRate);
}

function validateUniqueTL(name, empId, mobile, excludeMobile){
  if(!/^\d{5}$/.test(empId)) return "Employee ID must be exactly 5 digits (numbers only).";
  if(!/^\d{10}$/.test(mobile)) return "Mobile number must be exactly 10 digits (numbers only).";
  const nameLower = name.trim().toLowerCase();
  for(const t of cachedTLs){
    if(excludeMobile && t.mobile === excludeMobile) continue;
    if(t.name.trim().toLowerCase() === nameLower) return `The name "${t.name}" is already registered to another Team Leader. Names must be unique.`;
    if(t.employeeId === empId) return `Employee ID ${empId} is already registered to ${t.name}. Employee IDs must be unique.`;
    if(t.mobile === mobile) return `Mobile number ${mobile} is already registered to ${t.name}. Mobile numbers must be unique.`;
  }
  return null;
}
async function doRegister(){
  const name = document.getElementById("regName").value.trim();
  const empId = document.getElementById("regEmpId").value.trim();
  const mobile = sanitizeMobile(document.getElementById("regMobile").value.trim());
  if(!name || !empId || !mobile){ alert("Please fill all fields."); return; }
  await loadAllTLs();
  const err = validateUniqueTL(name, empId, mobile, null);
  if(err){ alert(err); return; }
  const tl = {name, employeeId:empId, mobile, registeredAt: nowIso()};
  await storSet(tlKey(mobile), tl);
  await loadAllTLs();
  setState({currentTL: tl, screen:"tl_home"});
}

function yesterdayStr(){ const d = new Date(); d.setDate(d.getDate()-1); return d.toISOString().slice(0,10); }
function isExpired(r){ return !!(r && r.expiresAt && Date.now() > Date.parse(r.expiresAt)); }
async function startInspection(){
  await loadCustomAreas();
  state.selectedArea = null;
  state.answers = {};
  state.manpower = "";
  state.comments = "";
  state.photos = [];
  state.activeReportDate = null;
  state.reportLocked = false;
  state.lockedPreview = null;
  setState({screen:"tl_area"});
}
async function ensureDraftForArea(){
  const mobile = state.currentTL.mobile;
  const area = state.selectedArea;
  const todayRep = await storGet(rptKey(todayStr(), mobile, area));
  const yestRep = await storGet(rptKey(yesterdayStr(), mobile, area));
  let active = null;
  if(todayRep && !isExpired(todayRep)) active = todayRep;
  else if(yestRep && !isExpired(yestRep)) active = yestRep;

  if(active){
    state.activeReportDate = active.date;
    state.answers = active.answers || {};
    state.manpower = (active.manpower !== undefined && active.manpower !== null) ? String(active.manpower) : "";
    state.comments = active.comments || "";
    state.photos = active.photos || [];
    state.reportLocked = false;
    state.lockedPreview = null;
    state.reportExpiresAt = active.expiresAt || null;
  } else {
    const expiredOne = (todayRep && isExpired(todayRep)) ? todayRep : ((yestRep && isExpired(yestRep)) ? yestRep : null);
    if(expiredOne){
      state.reportLocked = true;
      state.lockedPreview = expiredOne;
      state.activeReportDate = null;
      state.answers = {}; state.manpower = ""; state.comments = ""; state.photos = [];
    } else {
      state.activeReportDate = todayStr();
      state.answers = {}; state.manpower = ""; state.comments = ""; state.photos = [];
      state.reportLocked = false;
      state.lockedPreview = null;
      state.reportExpiresAt = null;
    }
  }
}
async function saveDraft(){
  if(!state.currentTL || !state.selectedArea || state.reportLocked || !state.activeReportDate) return;
  const key = rptKey(state.activeReportDate, state.currentTL.mobile, state.selectedArea);
  const existing = await storGet(key);
  if(isExpired(existing)){
    state.reportLocked = true; state.lockedPreview = existing; setState({screen:"tl_form"}); return;
  }
  const createdAt = existing ? existing.createdAt : nowIso();
  const expiresAt = existing ? existing.expiresAt : new Date(Date.now() + EDIT_WINDOW_MS).toISOString();
  state.reportExpiresAt = expiresAt;
  const report = {
    mobile: state.currentTL.mobile,
    name: state.currentTL.name,
    area: state.selectedArea,
    date: state.activeReportDate,
    answers: state.answers,
    manpower: state.manpower === "" ? null : Number(state.manpower),
    comments: state.comments,
    photos: state.photos,
    compliance: calcCompliance(state.answers),
    status: (existing && existing.status === "submitted") ? "submitted" : "draft",
    createdAt, expiresAt,
    updatedAt: nowIso(),
    submittedAt: existing ? existing.submittedAt : null
  };
  await storSet(key, report);
}
async function doSubmit(){
  if(state.reportLocked || !state.activeReportDate) return;
  if(!state.photos || state.photos.length === 0){
    alert("Please attach at least 1 site photo before submitting.");
    setState({screen:"tl_form"});
    return;
  }
  const key = rptKey(state.activeReportDate, state.currentTL.mobile, state.selectedArea);
  const existing = await storGet(key);
  if(isExpired(existing)){
    state.reportLocked = true; state.lockedPreview = existing; setState({screen:"tl_form"}); return;
  }
  const createdAt = existing ? existing.createdAt : nowIso();
  const expiresAt = existing ? existing.expiresAt : new Date(Date.now() + EDIT_WINDOW_MS).toISOString();
  const report = {
    mobile: state.currentTL.mobile,
    name: state.currentTL.name,
    area: state.selectedArea,
    date: state.activeReportDate,
    answers: state.answers,
    manpower: state.manpower === "" ? null : Number(state.manpower),
    comments: state.comments,
    photos: state.photos,
    compliance: calcCompliance(state.answers),
    status: "submitted",
    createdAt, expiresAt,
    updatedAt: nowIso(),
    submittedAt: nowIso()
  };
  await storSet(key, report);
  setState({screen:"tl_success"});
}

async function doHseLogin(){
  const name = document.getElementById("hseName").value;
  const pin = document.getElementById("hsePinInput").value;
  const stored = await storGet(hsePinKey(name));
  if(!stored || pin !== stored.pin){
    document.getElementById("hsePinError").textContent = "Incorrect PIN. Please try again.";
    return;
  }
  setState({hseUser:name, screen:"hse_dash", hseTab:"overview"});
}
async function doHseSetupPin(){
  const name = document.getElementById("hseName").value;
  const pin = document.getElementById("hsePinNew").value;
  const confirm = document.getElementById("hsePinConfirm").value;
  const errEl = document.getElementById("hsePinError");
  if(!/^\d{4}$/.test(pin)){ errEl.textContent = "PIN must be exactly 4 digits."; return; }
  if(pin !== confirm){ errEl.textContent = "PINs do not match. Please re-enter."; return; }
  const others = await Promise.all(HSE_NAMES.filter(n=>n!==name).map(n=>storGet(hsePinKey(n))));
  if(others.some(o=>o && o.pin === pin)){ errEl.textContent = "That PIN is already used by another HSE member. Please choose a different one."; return; }
  const ok = await storSet(hsePinKey(name), {pin, setAt: nowIso()});
  if(!ok){
    errEl.textContent = "Couldn't save your PIN — " + (lastStorError || "unknown error") + ". Check the browser console for details.";
    return;
  }
  hsePinStatuses[name] = true;
  setState({hseUser:name, screen:"hse_dash", hseTab:"overview"});
}

async function saveNewArea(){
  const input = document.getElementById("mAreaName");
  const errEl = document.getElementById("mAreaError");
  const raw = input ? input.value.trim() : "";
  if(!raw){ errEl.textContent = "Please enter an area name."; return; }
  // Strip characters that could break HTML attributes/markup — area names are rendered
  // directly in several places (tiles, dropdown options, banners) without escaping.
  const cleaned = raw.replace(/[^a-zA-Z0-9 &\-_/]/g, "").replace(/\s+/g, " ").trim();
  if(!cleaned){ errEl.textContent = "Please use letters, numbers or spaces for the area name."; return; }
  const name = cleaned.toUpperCase().slice(0, 30);
  if(AREAS.some(a=>a.toUpperCase()===name)){ errEl.textContent = "That area already exists."; return; }
  const list = [...CUSTOM_AREAS, {name, color: AREA_PALETTE[CUSTOM_AREAS.length % AREA_PALETTE.length]}];
  await saveCustomAreasList(list);
  closeModal();
  if(state.currentTL){
    state.selectedArea = name;
    await ensureDraftForArea();
    setState({screen:"tl_form"});
  } else {
    render();
  }
}

const MISSING_LOOKBACK_DAYS = 30;
async function computeMissingSummary(){
  const tls = await loadAllTLs();
  const allKeys = await storList("rpt:");
  const allReports = (await Promise.all(allKeys.map(k=>storGet(k)))).filter(r=>r && r.status==="submitted");
  const submittedDatesByMobile = {};
  allReports.forEach(r=>{
    const m = sanitizeMobile(r.mobile);
    if(!submittedDatesByMobile[m]) submittedDatesByMobile[m] = new Set();
    submittedDatesByMobile[m].add(r.date);
  });
  const today = todayStr();
  return tls.map(t=>{
    const mobile = sanitizeMobile(t.mobile);
    const regDate = t.registeredAt ? t.registeredAt.slice(0,10) : today;
    const submittedSet = submittedDatesByMobile[mobile] || new Set();
    const missedDates = [];
    for(let i=0;i<MISSING_LOOKBACK_DAYS;i++){
      const d = new Date(); d.setDate(d.getDate()-i);
      const dstr = d.toISOString().slice(0,10);
      if(dstr < regDate) break;
      if(!submittedSet.has(dstr)) missedDates.push(dstr);
    }
    return {
      name:t.name, mobile:t.mobile,
      missedToday: !submittedSet.has(today),
      missedDates: missedDates.sort((a,b)=>b.localeCompare(a))
    };
  });
}
async function openMissingTodayModal(){
  const results = await computeMissingSummary();
  const missing = results.filter(r=>r.missedToday).sort((a,b)=>b.missedDates.length-a.missedDates.length);
  if(missing.length===0){
    showModal(`<h3>Missing Today</h3><div class="empty-state">${ICON.check} Everyone has submitted at least one report today.</div><button class="btn outline" style="margin-top:12px;" data-act="modal-close">Close</button>`);
    return;
  }
  showModal(`
    <h3>Missing Today (${missing.length})</h3>
    <div style="font-size:12.5px;color:var(--text-soft);margin-bottom:12px;">Number shown is total missed days in the last ${MISSING_LOOKBACK_DAYS} days. Tap a name to see the exact dates.</div>
    ${missing.map(m=>`
      <div class="tl-pick" data-act="missing-drilldown" data-mobile="${m.mobile}" data-name="${escapeHtml(m.name)}">
        <div><div class="n">${escapeHtml(m.name)}</div><div class="m">${escapeHtml(m.mobile)}</div></div>
        <div style="text-align:right;">
          <div style="font-weight:800;color:var(--danger);font-size:16px;">${m.missedDates.length}</div>
          <div style="font-size:10px;color:var(--text-soft);">missed (${MISSING_LOOKBACK_DAYS}d)</div>
        </div>
      </div>`).join("")}
    <button class="btn outline" style="margin-top:12px;" data-act="modal-close">Close</button>
  `);
}
async function openMissingDrilldown(mobile, name){
  const results = await computeMissingSummary();

  showModal(`

async function openTLBreakdownModal(mobile, name){
  const mobileClean = sanitizeMobile(mobile);
  const keys = await storList("rpt:");
  const mine = keys.filter(k=>parseRptKey(k).mobile === mobileClean);
  const reports = (await Promise.all(mine.map(k=>storGet(k)))).filter(r=>r && r.status==="submitted");
  if(reports.length===0){
    showModal(`<h3>${escapeHtml(name)}</h3><div class="empty-state">No submitted reports yet.</div><button class="btn outline" style="margin-top:12px;" data-act="modal-close">Close</button>`);
    return;
  }
  const areasPresent = [...new Set(reports.map(r=>r.area))];
  const areaColors = AREA_COLORS;
  const perItemPerArea = {};
  CHECKLIST.forEach(item=>{
    perItemPerArea[item.id] = {};
    areasPresent.forEach(a=>{ perItemPerArea[item.id][a] = {yes:0, total:0}; });
  });
  reports.forEach(r=>{
    CHECKLIST.forEach(item=>{
      const ans = r.answers ? r.answers[item.id] : null;
      if(ans === "Yes" || ans === "No"){
        perItemPerArea[item.id][r.area].total += 1;
        if(ans === "Yes") perItemPerArea[item.id][r.area].yes += 1;
      }
    });
  });
  showModal(`
    <h3>${escapeHtml(name)} — Compliance Breakdown</h3>
    <div style="font-size:12.5px;color:var(--text-soft);margin-bottom:12px;">Across all ${reports.length} submitted report(s) · Areas: ${areasPresent.join(", ")}</div>
    <div class="chart-wrap" style="height:${Math.max(260, CHECKLIST.length*46)}px;"><canvas id="chartTLBreakdown"></canvas></div>
    <button class="btn outline" style="margin-top:16px;" data-act="modal-close">Close</button>
  `);
  setTimeout(()=>{
    const ctx = document.getElementById("chartTLBreakdown");
    if(!ctx || typeof Chart === "undefined") return;
    destroyChart("chartTLBreakdown");
    const labels = CHECKLIST.map(item=>item.label.length>30 ? item.label.slice(0,28)+"…" : item.label);
    const datasets = areasPresent.map(a=>({
      label:a,
      data: CHECKLIST.map(item=>{
        const cell = perItemPerArea[item.id][a];
        return cell.total ? Math.round((cell.yes/cell.total)*100) : null;
      }),
      backgroundColor: areaColors[a] || "#888",
      borderRadius:4
    }));
    chartInstances["chartTLBreakdown"] = new Chart(ctx, {
      type:"bar",
      data:{labels, datasets},
      options:{
        indexAxis:"y",
        responsive:true, maintainAspectRatio:false,
        scales:{ x:{ min:0, max:100, ticks:{callback:v=>v+"%"} } },
        plugins:{
          legend:{ display: areasPresent.length>1, position:"bottom" },
          tooltip:{ callbacks:{ label: (c)=> c.dataset.label + ": " + (c.raw===null ? "No data" : c.raw+"% compliant") } }
        }
      }
    });
  }, 60);
}

async function exportCSV(){
  const f = state.reportsFilter;
  let reports = await getReportsInRange(f.range, f.area, f.customFrom, f.customTo);
  if(f.status!=="all") reports = reports.filter(r=>r.status===f.status);
  const headers = ["Date","Team Leader","Area","Man Power","Compliance %","Status", ...CHECKLIST.map(c=>c.label), "Comments"];
  const rows = reports.map(r=>[
    r.date, r.name, r.area, (r.manpower===null||r.manpower===undefined)?'':r.manpower, r.compliance===null?'':r.compliance, r.status,
    ...CHECKLIST.map(c=>r.answers[c.id]||''), (r.comments||'').replace(/[\r\n]+/g," ")
  ]);
  const csv = [headers, ...rows].map(row=>row.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(",")).join("\n");
  const blob = new Blob([csv], {type:"text/csv"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = "JGM_Inspection_Reports_"+todayStr()+".csv";
  a.click();
  URL.revokeObjectURL(url);
}
